name: Build and Deploy

on:
  push:
    branches: [main, master]
  schedule:
    # Tuesdays 14:00 UTC (mornings after Monday Night Football US-East).
    - cron: "0 14 * * 2"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch league data
        env:
          LEAGUE_ID: ${{ vars.LEAGUE_ID || '14250' }}
          ESPN_S2: ${{ secrets.ESPN_S2 }}
          SWID: ${{ secrets.SWID }}
        run: python scripts/fetch_data.py

      - name: Install Node deps
        run: npm ci || npm install

      - name: Build site
        env:
          # GitHub Pages serves project sites under /<repo>/. Override via repo vars if needed.
          ASTRO_SITE: ${{ vars.ASTRO_SITE || format('https://{0}.github.io', github.repository_owner) }}
          ASTRO_BASE: ${{ vars.ASTRO_BASE || format('/{0}/', github.event.repository.name) }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
